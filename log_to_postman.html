<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>日志转 Postman 转换器</title>
<style>
  body {font-family: Arial, sans-serif; margin: 20px;}
  textarea {width: 100%; height: 300px;}
  #output {white-space: pre; background:#f0f0f0; padding:10px; margin-top:10px;}
  button {margin-top:10px; padding:8px 16px;}
</style>
</head>
<body>
<h2>日志 → Postman 集合</h2>
<p>将服务器日志（如示例所示）粘贴到下方文本框并点击 <strong>生成</strong>。生成的 JSON 将提供下载。</p>
<textarea id="logInput" placeholder="请在此粘贴日志..."></textarea><br>
<button id="generateBtn">生成 JSON</button>
<button id="copyBtn" style="margin-top:10px; padding:8px 16px; display:none;">复制 JSON</button>
<div id="output"></div>
    <button id="copyBtn" style="margin-top:10px; padding:8px 16px; display:none;">复制 JSON</button>
<script>
  const REQ_RE = /请求URI:([^,]+).*?参数:\s*(\{[\s\S]*?\})(?:,|$)/;
  const REQ_GET_RE = /请求URI:([^,]+)/;
  const RESP_RE = /返回数据：({.*})/s;

  function parseLogs(text) {
    const lines = text.split(/\n/);
    const requests = [];
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      let m = REQ_RE.exec(line);
      if (m) {
        const uri = m[1].trim();
        let body;
        try { body = JSON.parse(m[2]); } catch(e) { body = {}; }
        let response = null;
        if (i + 1 < lines.length) {
          const respMatch = RESP_RE.exec(lines[i+1]);
          if (respMatch) {
            try { response = JSON.parse(respMatch[1]); } catch(e) { response = null; }
            i++; // consume response line
          }
        }
        requests.push({uri, method: 'POST', body, response});
        continue;
      }
      m = REQ_GET_RE.exec(line);
      if (m) {
        const uri = m[1].trim();
        let response = null;
        if (i + 1 < lines.length) {
          const respMatch = RESP_RE.exec(lines[i+1]);
          if (respMatch) {
            try { response = JSON.parse(respMatch[1]); } catch(e) { response = null; }
            i++;
          }
        }
        requests.push({uri, method: 'GET', body: null, response});
      }
    }
    return requests;
  }

  function buildCollection(requests) {
    const collection = {
      info: {
        name: "Generated from logs",
        schema: "https://schema.getpostman.com/json/collection/v2.1.0/collection.json"
      },
      item: []
    };
    requests.forEach(req => {
      const path = req.uri.replace(/^\//, '');
      const item = {
        name: `${req.method} ${path}`,
        request: {
          method: req.method,
          header: [{key: "Content-Type", value: "application/json"}],
          url: {
            raw: `{{baseUrl}}/${path}`,
            host: ["{{baseUrl}}"],
            path: path.split('/')
          }
        },
        response: []
      };
      if (req.body) {
        item.request.body = {
          mode: "raw",
          raw: JSON.stringify(req.body, null, 2),
          options: {raw: {language: "json"}}
        };
      }
      if (req.response) {
        item.response.push({
          name: "Example response",
          originalRequest: item.request,
          status: "OK",
          code: 200,
          header: [{key: "Content-Type", value: "application/json"}],
          body: JSON.stringify(req.response, null, 2)
        });
      }
      collection.item.push(item);
    });
    return collection;
  }

  document.getElementById('generateBtn').addEventListener('click', () => {
    const logText = document.getElementById('logInput').value.trim();
    if (!logText) { alert('请先粘贴日志'); return; }
    const reqs = parseLogs(logText);
    if (reqs.length === 0) { alert('未识别到可用日志'); return; }
    const collection = buildCollection(reqs);
    const jsonStr = JSON.stringify(collection, null, 2);
    const blob = new Blob([jsonStr], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'postman_collection.json';
    a.click();
    URL.revokeObjectURL(url);
    document.getElementById('output').textContent = jsonStr;
        const copyBtn = document.getElementById('copyBtn');
        copyBtn.style.display = 'inline-block';
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(jsonStr).then(() => {
            alert('已复制到剪贴板');
          }).catch(() => {
            alert('复制失败');
          });
        };
  });
</script>
</body>
</html>
